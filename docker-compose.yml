version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: localshare_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: localshare
      POSTGRES_PASSWORD: localshare
      POSTGRES_DB: localshare
    ports:
      - '5432:5432'
    volumes:
      - localshare_pgdata:/var/lib/postgresql/data

volumes:
  localshare_pgdata:
